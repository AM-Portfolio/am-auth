server {
    listen 80;
    server_name localhost;
    
    # Serve Flutter web app
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        
        # Enable CORS for development
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
    }
    
    # Note: API Gateway removed - Port 8000 reserved for Traefik
    # Services accessed directly
    
    # Proxy Auth Service requests (direct access to auth tokens)
    location /auth/ {
        proxy_pass http://auth-tokens:8001/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Proxy User Service requests (direct access to user management on port 8002)
    location /users/ {
        proxy_pass http://am-user-management:8002/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Health check endpoints - proxy to services
    
    location /auth-health {
        proxy_pass http://auth-tokens:8001/health;
        access_log off;
    }
    
    location /user-health {
        proxy_pass http://am-user-management:8002/health;
        access_log off;
    }

    location /infra-health {
        proxy_pass http://am-user-management:8002/users/v1/infra/health;
        access_log off;
    }
    
    # Health check endpoint for this service
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
