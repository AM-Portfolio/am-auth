name: CI/CD Pipeline
run-name: "Run ${{ github.run_id }} | Workflow: ${{ github.workflow_id }} | Actor: ${{ github.actor }}"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Replace with your GitHub Org or Username
  OWNER: am-portfolio

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [am-api-gateway, am-auth-tokens, am-user-management]
        include:
          - service: am-api-gateway
            context: ./am/am-api-gateway
          - service: am-auth-tokens
            context: ./am/am-auth-tokens
          - service: am-user-management
            context: ./am/am-user-management

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy shared library to service
        run: |
          mkdir -p ${{ matrix.context }}/shared
          cp -r am/shared/* ${{ matrix.context }}/shared/

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=raw,value=${{ github.run_id }}
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Deploy to K8s
        run: |
          helm upgrade --install am-auth ./helm/am-auth \
            --namespace am-apps-preprod \
            -f helm/am-auth/values-preprod.yaml \
            --set global.image.registry="${{ env.REGISTRY }}/${{ env.OWNER }}" \
            --set global.image.tag="${{ github.run_id }}"

      - name: Verify Rollout
        run: |
          ns="am-apps-preprod"
          deployments=("am-api-gateway" "am-auth-tokens" "am-user-management")
          failed=false

          for dep in "${deployments[@]}"; do
            echo "⏳ Waiting for rollout: $dep ..."
            if kubectl rollout status deployment/$dep -n $ns --timeout=10m; then
              echo "✅ $dep is healthy"
            else
              echo "❌ Rollout FAILED for $dep"
              failed=true
            fi
          done

          if [ "$failed" = "true" ]; then
            echo ""
            echo "=== Pod Status ==="
            kubectl get pods -n $ns
            echo ""
            echo "=== Recent Events ==="
            kubectl get events -n $ns --sort-by='.lastTimestamp' | tail -20
            exit 1
          fi

      - name: Rollout Summary (on failure)
        if: failure()
        run: |
          echo "🔍 Deployment failed. Full pod diagnostics:"
          kubectl get pods -n am-apps-preprod -o wide
          echo ""
          for dep in am-api-gateway am-auth-tokens am-user-management; do
            echo "--- Describe: $dep ---"
            kubectl describe deployment/$dep -n am-apps-preprod 2>&1 | tail -30
          done
