name: CI/CD Pipeline
run-name: "Run ${{ github.run_id }} | Workflow: ${{ github.workflow_id }} | Actor: ${{ github.actor }}"

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Replace with your GitHub Org or Username
  OWNER: am-portfolio

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [am-api-gateway, am-auth-tokens, am-user-management]
        include:
          - service: am-api-gateway
            context: ./am/am-api-gateway
          - service: am-auth-tokens
            context: ./am/am-auth-tokens
          - service: am-user-management
            context: ./am/am-user-management

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy shared library to service
        run: |
          mkdir -p ${{ matrix.context }}/shared
          cp -r am/shared/* ${{ matrix.context }}/shared/

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=raw,value=${{ github.run_id }}
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set short SHA
        id: vars
        shell: powershell
        run: |
          $sha = $env:GITHUB_SHA.Substring(0,7)
          echo "sha_short=$sha" >> $env:GITHUB_OUTPUT

      - name: Deploy to K8s
        shell: powershell
        run: |
          helm upgrade --install am-auth ./helm/am-auth `
            --namespace am-apps-preprod `
            --set global.image.registry="${{ env.REGISTRY }}/${{ env.OWNER }}" `
            --set global.image.tag="${{ github.run_id }}"

      - name: Verify Rollout
        shell: powershell
        run: |
          $ns = "am-apps-preprod"
          $deployments = @("am-api-gateway", "am-auth-tokens", "am-user-management")
          $timeout = "10m"
          $failed = $false

          foreach ($dep in $deployments) {
            Write-Host "⏳ Waiting for rollout: $dep ..."
            kubectl rollout status deployment/$dep -n $ns --timeout=$timeout
            if ($LASTEXITCODE -ne 0) {
              Write-Host "❌ Rollout FAILED for $dep"
              $failed = $true
            } else {
              Write-Host "✅ $dep is healthy"
            }
          }

          if ($failed) {
            Write-Host ""
            Write-Host "=== Pod Status ==="
            kubectl get pods -n $ns
            Write-Host "" I
            Write-Host "=== Recent Events ==="
            kubectl get events -n $ns --sort-by='.lastTimestamp' | Select-Object -Last 20
            exit 1
          }

      - name: Rollout Summary (on failure)
        if: failure()
        shell: powershell
        run: |
          Write-Host "🔍 Deployment failed. Full pod diagnostics:"
          kubectl get pods -n am-apps-preprod -o wide
          Write-Host ""
          foreach ($dep in @("am-api-gateway", "am-auth-tokens", "am-user-management")) {
            Write-Host "--- Describe: $dep ---"
            kubectl describe deployment/$dep -n am-apps-preprod 2>&1 | Select-Object -Last 30
          }
