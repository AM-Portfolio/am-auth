name: AM Auth Services Publish
run-name: "Run ${{ github.run_id }} | ${{ github.actor }} | ${{ github.event_name }}"

on:
  push:
    branches: ["main", "develop"]
    paths:
      - 'am/am-api-gateway/**'
      - 'am/am-auth-tokens/**'
      - 'am/am-user-management/**'
      - 'am/shared/**'
  pull_request:
    branches: ["main", "develop"]
    paths:
      - 'am/am-api-gateway/**'
      - 'am/am-auth-tokens/**'
      - 'am/am-user-management/**'
      - 'am/shared/**'
  workflow_dispatch:

jobs:
  # ── Detect which services changed ─────────────────────────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      api-gateway:     ${{ steps.check.outputs.api-gateway }}
      auth-tokens:     ${{ steps.check.outputs.auth-tokens }}
      user-management: ${{ steps.check.outputs.user-management }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect path changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: rebuild all services
            echo "api-gateway=true"     >> $GITHUB_OUTPUT
            echo "auth-tokens=true"     >> $GITHUB_OUTPUT
            echo "user-management=true" >> $GITHUB_OUTPUT
            exit 0
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files)
          else
            CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          fi

          echo "=== Changed files ==="
          echo "$CHANGED"
          echo "====================="

          # Any change to shared/ triggers all services
          SHARED=$(echo "$CHANGED" | grep -q "^am/shared/" && echo 'true' || echo 'false')

          GW=$(echo "$CHANGED" | grep -q "^am/am-api-gateway/"     && echo 'true' || echo 'false')
          TK=$(echo "$CHANGED" | grep -q "^am/am-auth-tokens/"     && echo 'true' || echo 'false')
          UM=$(echo "$CHANGED" | grep -q "^am/am-user-management/" && echo 'true' || echo 'false')

          [ "$SHARED" = "true" ] && GW="true" && TK="true" && UM="true"

          echo "api-gateway=$GW"     >> $GITHUB_OUTPUT
          echo "auth-tokens=$TK"     >> $GITHUB_OUTPUT
          echo "user-management=$UM" >> $GITHUB_OUTPUT

  # ── API Gateway ─────────────────────────────────────────────────────────────
  # Reverse-proxy / rate-limiter sitting in front of all internal services.
  # Triggers only when am-api-gateway or shared code changes.
  publish-api-gateway:
    name: Publish API Gateway
    needs: detect-changes
    if: needs.detect-changes.outputs.api-gateway == 'true'
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@main
    with:
      language: 'python'
      working_directory: 'am/am-api-gateway'
      image_name: 'am-api-gateway'
      build_context: '..'         # Context = am/ so Dockerfile can COPY shared/ and am-api-gateway/
      preprod_namespace: 'am-apps-preprod'
      prod_namespace: 'am-apps-prod'
      deploy_prod: true
    secrets: inherit

  # ── Auth Tokens ─────────────────────────────────────────────────────────────
  # Issues and validates JWT tokens. Depends on Vault jwt + postgres secrets.
  publish-auth-tokens:
    name: Publish Auth Tokens
    needs: detect-changes
    if: needs.detect-changes.outputs.auth-tokens == 'true'
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@main
    with:
      language: 'python'
      working_directory: 'am/am-auth-tokens'
      image_name: 'am-auth-tokens'
      build_context: '..'         # Context = am/ so Dockerfile can COPY shared/ and am-auth-tokens/
      preprod_namespace: 'am-apps-preprod'
      prod_namespace: 'am-apps-prod'
      deploy_prod: true
    secrets: inherit

  # ── User Management ─────────────────────────────────────────────────────────
  # Handles registration, login, and user state. Depends on jwt + postgres + redis.
  publish-user-management:
    name: Publish User Management
    needs: detect-changes
    if: needs.detect-changes.outputs.user-management == 'true'
    permissions:
      contents: read
      packages: write
    uses: AM-Portfolio/am-pipelines/.github/workflows/central-build-publish.yml@main
    with:
      language: 'python'
      working_directory: 'am/am-user-management'
      image_name: 'am-user-management'
      build_context: '..'         # Context = am/ so Dockerfile can COPY shared/ and am-user-management/
      preprod_namespace: 'am-apps-preprod'
      prod_namespace: 'am-apps-prod'
      deploy_prod: true
    secrets: inherit
