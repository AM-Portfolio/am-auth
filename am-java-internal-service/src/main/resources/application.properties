# Application Configuration
server.port=8003
spring.application.name=am-java-internal-service

# JWT Configuration
app.jwt.secret=${JWT_SECRET:your-secret-key-here-change-in-production}
app.internal.jwt.secret=${INTERNAL_JWT_SECRET:internal-service-super-secret-key-32chars-minimum-change-in-prod}

# Logging Configuration
logging.level.com.am.reporting=INFO
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Management endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always