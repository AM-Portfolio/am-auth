# Base Helm values for am-auth-tokens
# Used by the universal-chart from am-pipelines
global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
    imagePullSecrets:
      - name: regcred
  vault:
    enabled: true
    role: "am-backend-role"
    authPath: "auth/kubernetes"
    serviceAccountName: "am-backend-sa"

image:
  repository: am-auth-tokens
port: 8080
language: python
entrypoint: "exec uvicorn main:app --host 0.0.0.0 --port 8080"

security:
  automountServiceAccountToken: true

env:
  LOG_FORMAT: "json"
  LOG_LEVEL: "INFO"
  TZ: "UTC"
  USER_SERVICE_URL: "http://am-user-management:8080"
