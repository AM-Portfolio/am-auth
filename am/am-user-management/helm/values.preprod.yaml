# Preprod Environment — am-user-management
# Vault path aligned with seeded secret at kv/preprod/apps/auth
environment: preprod
replicaCount: 1

vault:
  enabled: true
  secretPaths:
    auth:
      path: "apps/data/preprod/services/am-user-management"
    postgres:
      path: "apps/data/preprod/infra/postgres"
