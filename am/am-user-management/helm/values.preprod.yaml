# Preprod Environment — am-user-management
# Vault path aligned with seeded secret at kv/preprod/apps/auth
environment: preprod
replicaCount: 1

global:
  vault:
    secrets:
      auth: "apps/data/preprod/services/am-user-management"
      infra: "apps/data/preprod/infra/postgres"
    templates:
      infra: |
        {{- with secret "apps/data/preprod/infra/postgres" -}}
        export DATABASE_URL="{{ .Data.data.url }}"
        {{- end }}
