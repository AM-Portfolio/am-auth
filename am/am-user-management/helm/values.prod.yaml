global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
  vault:
    enabled: true
    address: "http://vault.vault.svc.cluster.local:8200"
    role: "am-backend-role"
    authPath: "auth/kubernetes"
    serviceAccountName: "am-backend-sa"
    secrets:
      jwt:      "secret/data/prod/apps/auth/jwt"
      postgres: "secret/data/prod/infra/postgres"
      redis:    "secret/data/prod/infra/redis"

environment: prod
replicaCount: 2
language: python
image:
  repository: am-user-management
port: 8000
entrypoint: "exec uvicorn main:app --host 0.0.0.0 --port 8000"

env:
  ENABLE_EMAIL_VERIFICATION: "true"
  ALLOW_REGISTRATION: "false"
  MAX_LOGIN_ATTEMPTS: "3"
  ACCOUNT_LOCKOUT_MINUTES: "30"
  LOG_FORMAT: "json"
  LOG_LEVEL: "INFO"
