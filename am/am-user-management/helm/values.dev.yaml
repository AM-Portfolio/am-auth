# Dev Environment — am-user-management
environment: dev
replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

vault:
  enabled: true
  secretPaths:
    auth:
      path: "apps/data/dev/services/am-user-management"
    postgres:
      path: "apps/data/dev/infra/postgres"

hostAliases:
  - ip: "203.174.22.129"
    hostnames:
      - "redis.asrax.in"
      - "mongodb.asrax.in"
      - "kafka.asrax.in"

probes:
  port: 8080
  startup:
    path: "/actuator/health"
    failureThreshold: 30
    periodSeconds: 10
  liveness:
    path: "/actuator/health"
  readiness:
    path: "/actuator/health"

ingress:
  enabled: true
  className: "traefik"
  annotations:
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: >-
      am-apps-dev-dev-global-cors@kubernetescrd,
      am-apps-dev-dev-strip-prefix@kubernetescrd
  hosts:
    - host: am-dev.asrax.in
      paths:
        - path: /users
          pathType: Prefix

env:
  SPRING_PROFILES_ACTIVE: "dev"
  LOG_LEVEL: "DEBUG"
