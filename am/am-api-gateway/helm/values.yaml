global:
  image:
    registry: ghcr.io/am-portfolio
    pullPolicy: Always
    imagePullSecrets:
      - name: regcred
  vault:
    enabled: true
    address: "http://vault.vault.svc.cluster.local:8200"
    role: "am-backend-role"
    authPath: "auth/kubernetes"
    serviceAccountName: "am-backend-sa"

image:
  repository: am-api-gateway
port: 8080
language: python

env:
  LOG_FORMAT: "json"
  LOG_LEVEL: "INFO"
  TZ: "UTC"
