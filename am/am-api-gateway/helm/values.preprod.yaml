# Preprod Environment — am-api-gateway
# Vault path aligned with seeded secret at kv/preprod/apps/auth
environment: preprod
replicaCount: 1

vault:
  enabled: true
  secretPaths:
    auth:
      path: "apps/data/preprod/services/am-api-gateway"
    infra:
      path: "apps/data/preprod/infra/shared-api"
