version: '3.8'

services:
  # --- User Management Service (Python/FastAPI) ---
  am-user-management:
    container_name: am-user-management
    build:
      context: .
      dockerfile: am-user-management/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
      - .env.docker
    environment:
      - LOG_LEVEL=INFO
    networks:
      - am-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./am-user-management:/app
      - ./shared:/app/shared

  # --- Auth Tokens Service (Python/FastAPI) ---
  auth-tokens:
    container_name: auth-tokens
    build:
      context: .
      dockerfile: am-auth-tokens/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
      - .env.docker
    environment:
      - LOG_LEVEL=INFO
    networks:
      - am-network
    depends_on:
      am-user-management:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./am-auth-tokens:/app
      - ./shared:/app/shared

  # --- Diagnostic Web (Flutter) ---
  am-diagnostic-web:
    container_name: am-diagnostic-web
    build:
      context: ./am-diagnostic-web
      dockerfile: Dockerfile
    ports:
      - "9001:80"
    environment:
      - API_GATEWAY_URL=http://localhost:9001/api
    networks:
      - am-network
    restart: unless-stopped
    
  # --- API Gateway (Python/FastAPI) ---
  am-api-gateway:
    container_name: am_api_gateway
    build:
      context: ./am-api-gateway
      dockerfile: Dockerfile
    ports:
      - "8010:8000"
    env_file:
      - .env
      - .env.docker
    environment:
      - LOG_LEVEL=INFO
    networks:
      - am-network
    restart: unless-stopped

networks:
  am-network:
    name: am-infra_am-net
    external: true