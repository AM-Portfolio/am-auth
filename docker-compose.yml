version: '3.8'

services:
  # --- User Management Service (Python/FastAPI) ---
  am-user-management:
    container_name: am-user-management
    build:
      context: .
      dockerfile: am-user-management/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@am_postgresql:5432/portfolio
      - AUTH_SERVICE_URL=http://auth-tokens:8001
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=INFO
    networks:
      - am-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')" ]
      interval: 30s
      timeout: 1Mahalakshmi0s
      retries: 3

  # --- Auth Tokens Service (Python/FastAPI) ---
  auth-tokens:
    container_name: auth-tokens
    build:
      context: .
      dockerfile: am-auth-tokens/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@am_postgresql:5432/portfolio
      - USER_SERVICE_URL=http://am-user-management:8002
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - LOG_LEVEL=INFO
    networks:
      - am-network
    depends_on:
      am-user-management:
        condition: service_healthy
    restart: unless-stopped

  # --- Diagnostic Web (Flutter) ---
  am-diagnostic-web:
    container_name: am-diagnostic-web
    build:
      context: ./am-diagnostic-web
      dockerfile: Dockerfile
    ports:
      - "9001:80"
    environment:
      - API_GATEWAY_URL=http://localhost:9001/api
    networks:
      - am-network
    restart: unless-stopped

networks:
  am-network:
    name: am-infra_am-net
    external: true