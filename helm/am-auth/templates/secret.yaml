# ServiceAccount used by all am-auth pods to authenticate with Vault
# Vault's Kubernetes auth method validates the pod's ServiceAccount JWT
# against the Kubernetes TokenReview API to determine identity + role.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: am-auth-vault-sa
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "am-auth.labels" . | nindent 4 }}
  annotations:
    # Tell Vault which role this ServiceAccount maps to
    vault.hashicorp.com/role: {{ .Values.global.vault.role | quote }}
