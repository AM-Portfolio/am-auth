# Local development values for am-auth
# These values are used for local Helm deployment (e.g., Docker Desktop, Minikube)

environment: local
namespace: am-apps-local

global:
  isLocal: true
  image:
    registry: "local"
    pullPolicy: Never
    tag: "latest"

  vault:
    enabled: false
    # Use host.docker.internal to reach vault if needed, but disabled by default here
    address: "http://host.docker.internal:8200"

apiGateway:
  replicaCount: 1
  env:
    JWT_SECRET: "jwt-super-secret-signing-key-change-in-production-must-be-32chars-minimum-xyz"
    DATABASE_URL: "postgresql://postgres:wX8MVFdifFs4ZhnJ5pFZCbQ9@host.docker.internal:5432/postgres"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"

userManagement:
  replicaCount: 1
  env:
    DATABASE_URL: "postgresql://postgres:wX8MVFdifFs4ZhnJ5pFZCbQ9@host.docker.internal:5432/postgres"
    SECRET_KEY: "am-user-management-super-secret-key-change-in-production-32chars-minimum-abcdef"
    JWT_SECRET_KEY: "jwt-super-secret-signing-key-change-in-production-must-be-32chars-minimum-xyz"
    REDIS_URL: "redis://:RedisPassword123!@host.docker.internal:6379/0"
    USER_MGMT_PERSIST_TO_DB: "true"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"

authTokens:
  replicaCount: 1
  env:
    DATABASE_URL: "postgresql://postgres:wX8MVFdifFs4ZhnJ5pFZCbQ9@host.docker.internal:5432/postgres"
    JWT_SECRET: "jwt-super-secret-signing-key-change-in-production-must-be-32chars-minimum-xyz"
    INTERNAL_JWT_SECRET: "internal-service-super-secret-key-32chars-minimum-change-in-prod"
    AUTH_TOKENS_PERSIST_TO_DB: "false"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
