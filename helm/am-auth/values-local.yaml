# Local development values for am-auth
# These values are used for local Helm deployment (e.g., Docker Desktop, Minikube)

environment: local
namespace: am-apps-local

global:
  isLocal: true
  image:
    registry: "local"
    pullPolicy: Never
    tag: "latest"

  vault:
    enabled: false
    # Use host.docker.internal to reach vault if needed, but disabled by default here
    address: "http://host.docker.internal:8200"

apiGateway:
  replicaCount: 1
  env: {}
    # Injected by deploy_local.py from .env:
    # JWT_SECRET
    # DATABASE_URL
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"

userManagement:
  replicaCount: 1
  env: {}
    # Injected by deploy_local.py from .env:
    # DATABASE_URL
    # SECRET_KEY
    # JWT_SECRET_KEY
    # REDIS_URL
    # USER_MGMT_PERSIST_TO_DB
    # CLS_URL
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"

authTokens:
  replicaCount: 1
  env: {}
    # Injected by deploy_local.py from .env:
    # DATABASE_URL
    # JWT_SECRET
    # INTERNAL_JWT_SECRET
    # AUTH_TOKENS_PERSIST_TO_DB
    # CLS_URL
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
