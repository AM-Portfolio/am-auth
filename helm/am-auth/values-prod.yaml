global:
  image:
    registry: ghcr.io/am-portfolio
    tag: "${GITHUB_SHA}"
    pullPolicy: IfNotPresent

  vault:
    enabled: true
    address: "http://vault.vault.svc.cluster.local:8200"
    role: "am-backend-role"
    authPath: "auth/kubernetes"
    secrets:
      jwt:          "secret/data/prod/apps/auth/jwt"
      postgres:     "secret/data/prod/infra/postgres"
      redis:        "secret/data/prod/infra/redis"

environment: prod
namespace: am-apps-prod

authTokens:
  enabled: true
  replicaCount: 2
  image:
    repository: am-auth-tokens
  port: 8001

userManagement:
  enabled: true
  replicaCount: 2
  image:
    repository: am-user-management
  port: 8000
  features:
    enableEmailVerification: true
    allowRegistration: false
    maxLoginAttempts: 3
    accountLockoutMinutes: 30

apiGateway:
  enabled: true
  replicaCount: 2
  image:
    repository: am-api-gateway
  port: 8080
