global:
  image:
    registry: ghcr.io/am-portfolio
    tag: "${GITHUB_SHA}"
    pullPolicy: IfNotPresent

  vault:
    enabled: true
    address: "http://vault.vault.svc.cluster.local:8200"
    role: "am-backend-role"
    authPath: "auth/kubernetes"
    secrets:
      jwt:          "secret/data/preprod/apps/auth/jwt"
      postgres:     "secret/data/preprod/infra/postgres"
      redis:        "secret/data/preprod/infra/redis"

environment: preprod
namespace: am-apps-preprod

authTokens:
  enabled: true
  replicaCount: 1
  image:
    repository: am-auth-tokens
  port: 8001

userManagement:
  enabled: true
  replicaCount: 1
  image:
    repository: am-user-management
  port: 8000
  features:
    enableEmailVerification: false
    allowRegistration: true
    maxLoginAttempts: 5
    accountLockoutMinutes: 15

apiGateway:
  enabled: true
  replicaCount: 1
  image:
    repository: am-api-gateway
  port: 8080
